<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Spotify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Circular', 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-top: 32px;
        }

        .container {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .logo { font-size: 40px; margin-bottom: 40px; }

        h1 {
            font-size: 44px;
            font-weight: 900;
            margin-bottom: 40px;
            line-height: 1.1;
            letter-spacing: -2px;
        }

        form { text-align: left; }

        .form-group { margin-bottom: 24px; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: #121212;
            border: 1px solid #878787;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            outline: 2px solid white;
            border-color: transparent;
        }

        .btn-green {
            width: 100%;
            background-color: #1ED760;
            color: black;
            border: none;
            padding: 14px;
            border-radius: 500px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: #b3b3b3;
            font-size: 14px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #292929;
        }

        .divider span { padding: 0 16px; }

        .social-btn {
            width: 100%;
            background: none;
            border: 1px solid #878787;
            color: white;
            padding: 12px;
            border-radius: 500px;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .social-btn i {
            position: absolute;
            left: 24px;
            font-size: 20px;
        }

        .footer-text {
            margin-top: 48px;
            color: #b3b3b3;
            font-size: 16px;
            font-weight: 700;
        }

        .footer-text a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><i class="fab fa-spotify"></i></div>
        <h1>Entrar no<br>Spotify</h1>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">E-mail ou nome de usuário</label>
                <input type="text" name="username" id="id_username" required>
            </div>
            <div class="form-group">
                <label for="id_password">Senha</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            <button type="submit" class="btn-green">Entrar</button>
        </form>

        <div class="divider"><span>ou</span></div>

        <button class="social-btn"><i class="fas fa-mobile-alt"></i> Continuar com número</button>
        <button class="social-btn"><i class="fab fa-google"></i> Continuar com Google</button>
        <button class="social-btn"><i class="fab fa-apple"></i> Continuar com Apple</button>

        <p class="footer-text">Não tem uma conta? <a href="{% url 'signup' %}">Inscrever-se</a></p>
    </div>
</body>
</html>
