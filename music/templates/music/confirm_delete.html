{% extends 'base.html' %}
{% block content %}
<h1>Confirmar Exclusão</h1>
<p>Tem certeza que deseja excluir "{{ object }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn" style="background-color: red;">Confirmar</button>
</form>
<a href="javascript:history.back()">Cancelar</a>
{% endblock %}
